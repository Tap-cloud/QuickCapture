<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- Login view -->
  <div id="login-view">
    <div class="brand">
      <span class="brand-icon">📥</span>
      <span class="brand-name">Cove</span>
    </div>
    <p class="brand-tagline">Save anything. Find it fast.</p>
    <div class="form">
      <input type="email" id="email" placeholder="Email" autocomplete="email" autocapitalize="off" />
      <input type="password" id="password" placeholder="Password" autocomplete="current-password" />
      <p id="auth-error" class="error"></p>
      <button id="signin-btn" class="btn">Sign In</button>
    </div>
  </div>

  <!-- Save view -->
  <div id="save-view" style="display:none">
    <div class="top-bar">
      <div class="brand-small">
        <span>📥</span>
        <span class="brand-name-small">Cove</span>
      </div>
      <button id="signout-btn" class="signout-btn">Sign out</button>
    </div>

    <div class="preview-card">
      <img id="thumbnail" class="thumbnail" style="display:none" />
      <div class="preview-info">
        <img id="favicon" class="favicon" style="display:none" />
        <div class="preview-text">
          <p id="page-title" class="page-title"></p>
          <p id="page-domain" class="page-domain"></p>
        </div>
      </div>
    </div>

    <textarea id="note" placeholder="Add a note... (optional)" rows="3"></textarea>

    <button id="save-btn" class="btn save-btn">✨ Save to Cove</button>
    <p id="save-error" class="error" style="text-align:center"></p>
  </div>

  <!-- Confirmation view -->
  <div id="confirm-view" style="display:none">
    <div class="confirm-icon">✓</div>
    <p class="confirm-title">Saved!</p>
    <p class="confirm-sub">Added to Cove</p>
  </div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
